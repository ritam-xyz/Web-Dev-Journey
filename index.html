<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritam's Web Development Journey</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 600px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 18px;
        }
        
        .projects-link {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            transition: background 0.3s;
        }
        
        .projects-link:hover {
            background: #764ba2;
        }
        
        .status {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }
        
        .status p {
            color: #666;
            margin: 8px 0;
        }
        
        .completed {
            color: #27ae60;
            font-weight: bold;
        }
        
        .in-progress {
            color: #f39c12;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Ritam's Web Development Journey</h1>
        <p class="subtitle">HTML, CSS & Web Development Practice Projects</p>
        
        <a href="1.%20HTML/2.%20Decent-Mini-Projects/" class="projects-link">View My Projects →</a>
        
        <div class="status">
            <h3>Progress</h3>
            <p><span class="completed">✅ HTML</span> - Completed</p>
            <p><span class="in-progress">🔄 CSS</span> - In Progress</p>
            <p><span class="in-progress">🔄 JavaScript</span> - Coming Soon</p>
        </div>
    </div>
</body>
</html>
