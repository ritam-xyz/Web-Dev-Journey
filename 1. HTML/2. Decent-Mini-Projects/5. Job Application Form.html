<!DOCTYPE html>
<html>

<head>
    <title>Job Application Form</title>
</head>

<body>
    <header>
        <h1>JOB APPLICATION FORM</h1>
        <marquee behavior="scroll" direction="right"><b><i><mark>-We are hiring! Apply Now...</mark></i></b></marquee>
    </header>
    <hr>
    <main>
        <form action="/server">
            <section>
                <h2><u>Personal Details</u></h2>
                <label for="name"><b>Full Name:</b></label>
                <input type="text" name="name" id="name" placeholder="enter your name...">
                <br>
                <label for="email"><b>Email:</b></label>
                <input type="email" name="email" id="email" placeholder="enter your email...">
                <br>
                <label for="phn"><b>Phone:</b></label>
                <input type="number" id="phn" name="phone" placeholder="enter your phone no...">
            </section>
            <section>
                <h2><u>Educational Details</u></h2>
                <label for="c-name"><b>College Name:</b></label>
                <input type="text" id="c-name" name="c-name">
                <br>
                <label for="degree"><b>Degree:</b></label>
                <select name="degree" id="degree">
                    <option value="">select your degree</option>
                    <option value="b.tech-cse">B.Tech CSE</option>
                    <option value="b.tech">B.Tech Non CSE</option>
                    <option value="bca">BCA</option>
                    <option value="mca-tech">MCA or M.Tech</option>
                    <option value="others">Others</option>
                </select>
                <br>
                <label for="cgpa"><b>CGPA:</b></label>
                <input type="number" name="cgpa" id="cgpa">
            </section>
            <section>
                <h2><u>Skills</u></h2>
                <input type="checkbox" name="f-web" id="f-web">
                <label for="f-web">Frontend Web Developer</label>
                <br>
                <input type="checkbox" name="b-web" id="b-web">
                <label for="b-web">Backend Web Developer</label>
                <br>
                <input type="checkbox" name="full-web" id="full-web">
                <label for="full-web">Fullstack Web Developer</label>
                <br>
                <input type="checkbox" name="app-dev" id="app-dev">
                <label for="app-dev">Fullstack App Developer</label>
                <br>
                <input type="checkbox" name="aiml" id="aiml">
                <label for="aiml">AI/ML</label>
            </section>
            <div>
                <h3><u>Upload Your Resume</u></h3>
                <input type="file" name="resume">
            </div>
            <div>
                <h3><u>Why should we hire you?</u></h3>
                <textarea name="answer" placeholder="your answer..."></textarea>
            </div>
            <button>SUBMIT</button>
        </form>
    </main>
    <hr>
    <footer>
        <p><i>We'll update you with your email.</i></p>
        <p><b>Thank You</b> for your intrest!</p>
    </footer>
</body>

</html>
