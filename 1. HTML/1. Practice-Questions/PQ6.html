<!DOCTYPE html>
<html>

<head>
    <title>Table in HTML pt 2</title>
</head>

<body>
    <!-- Usecase of Table in HTML -->
    <table border="5px" height="250px" width="500px" align="center" cellspacing="5px" cellpadding="5px">
        <caption>A Test Table With Merged Cells</caption>
        <thead bgcolor="yellow">
            <tr>
                <th rowspan="2" bgcolor="grey"></th>
                <th colspan="2">Average</th>
                <th rowspan="2">Red Eyes</th>
            </tr>
            <tr>
                <th>Height</th>
                <th>Weight</th>
            </tr>
        </thead>
        <tbody bgcolor="magenta">
            <tr>
                <td bgcolor="limeblue">Male</td>
                <td>1.9</td>
                <td>0.003</td>
                <td>40%</td>
            </tr>
            <tr>
                <td bgcolor="pink">Female</td>
                <td>1.7</td>
                <td>0.002</td>
                <td>43%</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
