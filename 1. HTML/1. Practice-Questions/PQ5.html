<!DOCTYPE html>
<html>
<head>
    <title>Table in HTML</title>
</head>
<body>
    <table border="5px" height="400px" width="600px" cellspacing="5px" cellpadding="3px" bgcolor="yellow">
        <caption>Student Information</caption>
        <tr>
            <th rowspan="6" bgcolor="red">Info</th>
            <th rowspan="2" bgcolor="blue">Name</th>
            <th colspan="2" bgcolor="green">Address</th>
        </tr>
        <tr>
            <th bgcolor="violet">City</th>
            <th bgcolor="orange">House</th>
        </tr>
        <tr>
            <td>A</td>
            <td>Delhi</td>
            <td>1</td>
        </tr>
        <tr>
            <td>B</td>
            <td>Mumbai</td>
            <td>2</td>
        </tr>
        <tr>
            <td>c</td>
            <td>Kolkata</td>
            <td>3</td>
        </tr>
        <tr>
            <td>D</td>
            <td>Pune</td>
            <td>4</td>
        </tr>
    </table>
</body>
</html>
