<!DOCTYPE html>
<html>

<head>
    <title>Sub and Sup tags in HTML</title>
</head>

<body>
    <!-- Usecase of sub and sup tags in HTML -->
    <div>
        <h2><u>PYTHAGORAS THEOREM</u></h2>
        <i> Square of Hypotenous Equals to The Sum of Squares of Perpendicular and Base:</i>
        <b>H<sup>2</sup>=P<sup>2</sup>+B<sup>2</sup></b>
    </div>
    <hr>
    <div>
        <h2><u>GLUCOSE</u></h2>
        <i>Formula of Glucose:</i> <b>C<sub>6</sub>H<sub>12</sub>O<sub>6</sub></b>
    </div>
    <hr>
</body>

</html>
