<!DOCTYPE html>
<html>

<head>
    <title>Feedback Form</title>
</head>

<body>
    <h1>FEEDBACK FORM</h1>
    <hr>
    <form action="/server">
        <label for="name"><b>Name:</b></label>
        <input type="text" name="name" id="name" placeholder="enter yoyr full name...">
        <br>
        <br>
        <label for="email"><b>Email:</b></label>
        <input type="email" name="email" id="email" placeholder="enter your email...">
        <br>
        <br>
        <label for="Message"><b>Message:</b></label>
        <textarea name="message" id="message" placeholder="share your valuable feedback here..."></textarea>
        <br>
        <br>
        <b>Rate Us Out of 5:</b>
        <br>
        <input type="radio" name="rate" id="rate" value="1">
        <label for="1">1</label>
        <br>
        <input type="radio" name="rate" id="rate" value="2">
        <label for="2">2</label>
        <br>
        <input type="radio" name="rate" id="rate" value="3">
        <label for="3">3</label>
        <br>
        <input type="radio" name="rate" id="rate" value="4">
        <label for="4">4</label>
        <br>
        <input type="radio" name="rate" id="rate" value="5">
        <label for="5">5</label>
        <br>
        <br>
        <button>Send Your Feedback :)</button>
        <hr>
    </form>
</body>

</html>
