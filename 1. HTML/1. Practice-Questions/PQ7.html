<!DOCTYPE html>
<html lang="en">

<head>
    <title>Search Engine Webpage</title>
</head>

<body>
    <!-- Google, YouTube and WikiPedia Search -->
    <h1><u>SEARCH BAR FOR BROWSING</u></h1>
    <form action="https://www.google.com/search?" target="_blank">
        <label for="google"><img src="https://cdn-icons-png.flaticon.com/512/3128/3128287.png" alt="search icon"
                height="20px"></label>
        <input type="text" id="google" placeholder="type here..." name="q">
        <button type="submit">Google it</button>
    </form>
    <br>
    <form action="https://www.youtube.com/results?" target="_blank">

        <label for="google"><img src="https://cdn-icons-png.flaticon.com/256/1384/1384060.png" alt="search icon"
                height="20px"></label>
        <input type="text" id="google" placeholder="type here..." name="search_query">
        <button type="submit">YouTube search</button>
    </form>
    <br>
    <form action="https://www.amazon.in/s?" target="_blank">
        <label for="google"><img
                src="https://upload.wikimedia.org/wikipedia/commons/d/de/Amazon_icon.png"
                height="20px"></label>
        <input type="text" id="google" placeholder="type your product..." name="k">
        <button type="submit">seach in Amazon</button>
    </form>
</body>

</html>
